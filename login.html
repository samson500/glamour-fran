<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Access | Glamour Login</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap');
        
        :root {
            --glam-gold: #d4af37;
            --glam-black: #050505;
        }

        body { 
            background-color: var(--glam-black); 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .gold-text {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 32px;
            backdrop-filter: blur(20px);
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px 16px 50px;
            width: 100%;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: var(--glam-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(212, 175, 55, 0.6);
            font-size: 16px;
        }

        .btn-glam {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            color: #000;
            font-weight: 800;
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .btn-glam:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #statusMsg {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
            font-weight: bold;
            min-height: 1rem;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto w-full">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic gold-text uppercase tracking-tighter mb-2">GLAMOUR</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.5em] font-bold">Secure Member Access</p>
        </div>

        <div class="gold-border-card p-8 shadow-2xl">
            <form id="loginForm">
                
                <div class="input-group">
                    <i class="fas fa-at input-icon"></i>
                    <input type="text" id="username" placeholder="Username" class="input-field" required autocomplete="username">
                </div>

                <div class="input-group">
                    <i class="fas fa-shield-halved input-icon"></i>
                    <input type="password" id="password" placeholder="Passcode" class="input-field" required autocomplete="current-password">
                </div>

                <button type="submit" id="submitBtn" class="btn-glam mt-4">
                    Login
                </button>
                
                <div id="statusMsg"></div>
            </form>

            <div class="text-center mt-8 pt-4 border-t border-zinc-800/50">
                <p class="text-gray-500 text-[11px] font-bold uppercase tracking-widest">
                    Don't have an account? 
                    <a href="register.html" class="gold-text font-black ml-1 border-b border-gold-500/30">Join Elite</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-12 text-[9px] text-zinc-700 font-bold uppercase tracking-[0.3em]">© 2026 Glamour Elite Global Systems</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Exact Config from Signup
       const firebaseConfig = {
  apiKey: "AIzaSyAjsAimtV6oQCD8oCFrb72cyRBMXukB0yI",
  authDomain: "glamour-d3c61.firebaseapp.com",
  projectId: "glamour-d3c61",
  storageBucket: "glamour-d3c61.firebasestorage.app",
  messagingSenderId: "826174500352",
  appId: "1:826174500352:web:e2d35e3678eba9b182f2e5",
  measurementId: "G-H7MWQ3F2Q5"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading
            btn.disabled = true;
            btn.innerText = "Verifying Identity...";
            status.innerText = "";

            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            try {
                // Ensure auth session is active
                await signInAnonymously(auth);

                // Fetch the user document by ID (Username)
                const userRef = doc(db, 'users', username);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    throw new Error("Elite profile not found.");
                }

                const userData = userSnap.data();

                // Simple check: compare passwords
                if (userData.password === password) {
                    // Save username to localStorage so Dashboard knows who is logged in
                    localStorage.setItem('glamour_username', username);
                    
                    status.style.color = "#d4af37";
                    status.innerText = "ACCESS GRANTED. INITIALIZING...";
                    
                    // Redirect to your Dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1200);
                } else {
                    throw new Error("Invalid passcode provided.");
                }

            } catch (error) {
                console.error("Login Error:", error);
                status.style.color = "#ff4d4d";
                status.innerText = error.message.toUpperCase();
                btn.disabled = false;
                btn.innerText = "Authorize Entry";
            }
        });
    </script>
</body>
