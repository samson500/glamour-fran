<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact | Glamour Luxury</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap');
        
        :root {
            --glam-gold: #d4af37;
            --glam-bright-gold: #f5e050;
            --glam-black: #050505;
        }

        body { 
            background-color: var(--glam-black); 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .gold-text {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gold {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            color: #000;
            font-weight: 800;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }

        .btn-gold:active {
            transform: scale(0.98);
        }

        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .contact-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 28px;
            padding: 40px 24px;
            text-align: center;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 18px;
            width: 100%;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--glam-gold);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky-nav">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-black gold-text uppercase tracking-tighter">GLAMOUR</span>
            </div>
            <a href="index-2.html" class="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">
                <i class="fas fa-chevron-left mr-1"></i> Close
            </a>
        </div>
    </nav>

    <main class="px-6 py-10 max-w-lg mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black mb-4 tracking-tighter uppercase leading-none">Contact <span class="gold-text">Support</span></h1>
            <p class="text-gray-400 text-sm font-medium leading-relaxed px-4">
                Our luxury concierge team is available 24/7 to assist with your inquiries and account management.
            </p>
        </header>

        <!-- Official Support Channel -->
        <div class="mb-10">
            <div class="contact-card">
                <div class="w-16 h-16 bg-gradient-to-br from-yellow-400/20 to-yellow-600/20 rounded-full flex items-center justify-center text-yellow-500 mx-auto mb-6 shadow-inner">
                    <i class="fas fa-envelope-open-text text-2xl"></i>
                </div>
                <h3 class="gold-text font-black text-xs uppercase tracking-[0.2em] mb-2">Direct Channel</h3>
                <p class="text-white font-bold text-lg mb-6 break-all">freddaniel315@gmail.com</p>
                
                <a href="mailto:yetundekolawole963@gmail.com" class="btn-gold inline-block px-10 py-4 uppercase text-[10px] tracking-[0.15em]">
                    Send Email Now
                </a>
            </div>
        </div>

        <!-- Form Section -->
        <section class="mb-20">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-white/10"></div>
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Direct Message</h2>
                <div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-white/10"></div>
            </div>
            
            <form class="space-y-5" onsubmit="return false;">
                <div>
                    <input type="text" placeholder="Full Name" class="input-field">
                </div>
                <div>
                    <input type="email" placeholder="Email Address" class="input-field">
                </div>
                <div>
                    <textarea rows="5" placeholder="How can we help you today?" class="input-field"></textarea>
                </div>
                <button type="submit" class="btn-gold w-full py-5 uppercase text-[11px] tracking-[0.2em] mt-4 shadow-xl shadow-yellow-900/10">
                    Submit Inquiry
                </button>
            </form>
        </section>

        <!-- Footer -->
        <footer class="text-center pb-12">
            <p class="text-[9px] text-gray-600 font-bold uppercase tracking-[0.4em]">
                © 2026 GLAMOUR LUXURY NETWORK
            </p>
        </footer>
    </main>

</body>
