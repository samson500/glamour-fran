<head>

    <title>Join Glamour | Elite Registration</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap');
        
        :root {
            --glam-gold: #d4af37;
            --glam-black: #050505;
        }

        body { 
            background-color: var(--glam-black); 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0;
        }

        .gold-text {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 32px;
            backdrop-filter: blur(20px);
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px 16px 50px;
            width: 100%;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: var(--glam-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(212, 175, 55, 0.6);
            font-size: 16px;
        }

        .btn-glam {
            background: linear-gradient(135deg, #f5e050 0%, #d4af37 100%);
            color: #000;
            font-weight: 800;
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            margin-top: 10px;
        }

        #statusMsg {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto w-full pt-4 pb-12">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black gold-text uppercase tracking-tighter mb-2">GLAMOUR</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">Join Glamour</p>
        </div>

        <div class="gold-border-card p-8 shadow-2xl">
            <form id="signupForm">
                <input type="hidden" id="referrer" value="none">
                
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="fullName" placeholder="Full Name" class="input-field" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-at input-icon"></i>
                    <input type="text" id="username" placeholder="Username" class="input-field" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Email Address" class="input-field" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" class="input-field" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-globe input-icon"></i>
                    <select id="country" class="input-field" required style="appearance: none;">
                        <option value="" disabled selected>Select Country</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="Ghana">Ghana</option>
                        <option value="Cameroon">Cameroon</option>
                        <option value="SAF">South Africa</option>
                        <option value="USA">United States</option>
                        <option value="EUR">Europe</option>
                        <option value="OTH">Others</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="btn-glam">
                    REGISTER 
                </button>
                <div id="statusMsg"></div>
            </form>

            <div class="text-center mt-6">
                <p class="text-gray-500 text-xs">
                    Existing Member? 
                    <a href="login.html" class="gold-text font-bold ml-1">Log In</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAjsAimtV6oQCD8oCFrb72cyRBMXukB0yI",
  authDomain: "glamour-d3c61.firebaseapp.com",
  projectId: "glamour-d3c61",
  storageBucket: "glamour-d3c61.firebasestorage.app",
  messagingSenderId: "826174500352",
  appId: "1:826174500352:web:e2d35e3678eba9b182f2e5",
  measurementId: "G-H7MWQ3F2Q5"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Referral logic
        const params = new URLSearchParams(window.location.search);
        if(params.get("ref")) document.getElementById("referrer").value = params.get("ref");

        // Form Submit
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.innerText = "Verifying Credentials...";

            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const country = document.getElementById('country').value;

            // Internal Fee logic and Welcome Bonus logic
            let internalFee = "₦14,000";
            let welcomeBonus = 10000; // Default for Nigeria (₦10,000)

            if(country === "Ghana") {
                internalFee = "220 GHC";
                welcomeBonus = 180; // 180 Cedis bonus
            } else if(country === "Cameroon") {
                internalFee = "13,000 XAF";
                welcomeBonus = 10000; // 10,000 XAF bonus
            } else if(country === "USA") {
                internalFee = "10.00 USD";
                welcomeBonus = 8; // 8.00 USD bonus
            }

            try {
                await signInAnonymously(auth);
                
                // Check if username exists
                const userRef = doc(db, 'users', username);
                const userSnap = await getDoc(userRef);
                if(userSnap.exists()) throw new Error("Username already taken.");

                const userData = {
                    fullName: document.getElementById('fullName').value,
                    username: username,
                    email: email,
                    password: document.getElementById('password').value,
                    country: country,
                    referrer: document.getElementById('referrer').value,
                    regFee: internalFee,
                    balance: welcomeBonus, 
                    joinedAt: new Date().toISOString(),
                    status: 'active'
                };

                await setDoc(userRef, userData);
                
                localStorage.setItem('glamour_username', username);
                status.style.color = "#d4af37";
                status.innerText = "Account Created! Welcome to the Elite.";
                
                setTimeout(() => window.location.href = 'dashboard.html', 1500);

            } catch (error) {
                status.style.color = "#ff4d4d";
                status.innerText = error.message;
                btn.disabled = false;
                btn.innerText = "Join Glamour Elite";
            }
        });
    </script>
</body>
